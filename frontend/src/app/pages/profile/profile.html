<div class="content">

  <!-- PROFILE -->
  <div class="card">
    <h2>My Profile</h2>

    <div *ngIf="user">

      <div *ngIf="!isEditing">
        <p><strong>Username:</strong> {{ user.username }}</p>
        <button (click)="isEditing = true">Change</button>
      </div>

      <div *ngIf="isEditing">

        <div class="form-group">
          <label>Username</label>
          <input [(ngModel)]="user.username">
        </div>

        <div class="buttons">
          <button (click)="save(); isEditing = false">Save</button>
          <button (click)="isEditing = false">Cancel</button>
        </div>

      </div>

    </div>
  </div>

  <!-- CALENDAR -->
  <div class="card">
    
    <app-calendar></app-calendar>
  </div>

  <!-- PASSWORD -->
  <div class="card">
    <h3>Change Password</h3>

    <div class="form-group">
      <label>Current Password</label>
      <input type="password" [(ngModel)]="currentPassword">
    </div>

    <div class="form-group">
      <label>New Password</label>
      <input type="password" [(ngModel)]="newPassword">
    </div>

    <div class="form-group">
      <label>Confirm New Password</label>
      <input type="password" [(ngModel)]="confirmPassword">
    </div>

    <button (click)="changePassword()">Update Password</button>
  </div>

</div>
