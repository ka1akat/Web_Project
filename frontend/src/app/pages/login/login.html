<div class="page login-page">
  <div class="container">
    <div class="auth-wrap">
      <div class="brand">
        <div class="brand-icon" aria-hidden="true">↗</div>
        <h2>Welcome Back</h2>
        <p class="muted">Sign in to manage your finances</p>
      </div>

      <div class="card auth-card">
        <div class="card-inner">
          <div class="field-row">
            <label class="lbl muted-2">Username</label>
            <input class="field" [(ngModel)]="username" placeholder="your@email.com" />
          </div>

          <div class="field-row">
            <label class="lbl muted-2">Password</label>
            <input class="field" [(ngModel)]="password" type="password" placeholder="••••••••" />
          </div>

          <button class="btn btn-primary" (click)="login()">Sign In</button>

          <p class="msg" *ngIf="message">{{ message }}</p>

          <p class="footer muted">
            Don’t have an account?
            <a class="link" routerLink="/register">Sign up</a>
          </p>
        </div>
      </div>
    </div>
  </div>
</div>
